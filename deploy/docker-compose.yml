
services:
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-subscription-manager}_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../frontend-next/.next/standalone:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - subscription-manager-network
    profiles: [frontend]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: backend-builder  # Only build backend for this service
    container_name: ${PROJECT_NAME:-subscription-manager}_backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${BACKEND_PORT:-3001}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    restart: unless-stopped
    networks:
      - subscription-manager-network
    profiles: [backend]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${BACKEND_PORT:-3001}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-subscription-manager}_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-subscription}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-subscription_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - subscription-manager-network
    profiles: [db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subscription}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  subscription-manager-network:
    driver: bridge

volumes:
  postgres_data: