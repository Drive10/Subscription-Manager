server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Main application - serve frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy - route to backend
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # =============================================================================
    # Observability Endpoints
    # =============================================================================

    # Health check (Liveness) - basic liveness probe
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
        add_header X-Health-Level "basic";
    }

    # Readiness check - application fully initialized
    location /ready {
        access_log off;
        
        # Check if backend is ready
        proxy_pass http://backend:3001/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        
        # Fallback if backend is down - return 503 for frontend-only deployments
        error_page 502 503 504 =503;
    }

    # Metrics endpoint (Prometheus format)
    location /metrics {
        access_log off;
        
        proxy_pass http://backend:3001/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Prometheus text format
        add_header Content-Type "text/plain; version=0.0.4; charset=utf-8";
    }

    # Info endpoint - application metadata
    location /info {
        access_log off;
        return 200 '{"status":"running","version":"1.0.0","name":"subscription-manager","environment":"$env(ENVIRONMENT)"}';
        add_header Content-Type application/json;
    }

    # Status dashboard
    location /status {
        access_log off;
        default_type text/plain;
        
        set $status_color "green";
        set $status_text "healthy";
        
        # Check Nginx
        if ($remote_addr = "") {
            set $status_color "yellow";
            set $status_text "unknown";
        }
        
        return 200 'Status: $status_color
App: subscription-manager
Environment: $env(ENVIRONMENT)
Timestamp: $msec
Nginx: OK
Uptime: $uptime_sec seconds
';
    }
}